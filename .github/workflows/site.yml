# Simple workflow for deploying static content to GitHub Pages
name: Generate site and deploy content to Pages

on:
  schedule:
    - cron: "*/13 * * * *"  # Every 13 minutes - calendar check
    - cron: "1 * * * *"     # Every hour at 1 minute past - always rebuild
  # Runs on pushes targeting the default branch
  push:
    branches:
      - github-pages

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment. Cancel any in-progress/queued run when a new one starts
# so that a stuck-queued run cannot permanently block the concurrency slot (see 2026-04-03 incident).
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  check-calendar-changes:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    environment: github-pages
    if: github.event_name == 'schedule'
    outputs:
      calendar-changed: ${{ steps.check-changes.outputs.changed }}
    steps:
      - name: Restore previous calendar hash
        uses: actions/cache/restore@v3
        id: cache-restore
        with:
          path: previous_calendar_hash.txt
          key: calendar-hash-never-matches
          restore-keys: |
            calendar-hash-

      - name: Download calendar and check for changes
        id: check-changes
        env:
          CAL_URI: ${{ secrets.CAL_URI }}
        run: |
          # Download the calendar ICS file
          curl -s "$CAL_URI" -o current_calendar.ics
          
          # Compute SHA256 hash
          CURRENT_HASH=$(sha256sum current_calendar.ics | cut -d' ' -f1)
          echo "Current calendar hash: $CURRENT_HASH"
          
          # Try to get previous hash from cache
          if [ -f previous_calendar_hash.txt ]; then
            PREVIOUS_HASH=$(cat previous_calendar_hash.txt)
            echo "Previous calendar hash: $PREVIOUS_HASH"
          else
            PREVIOUS_HASH=""
            echo "No previous hash found (first run)"
          fi
          
          # Compare hashes
          if [ "$CURRENT_HASH" = "$PREVIOUS_HASH" ]; then
            echo "Calendar unchanged, skipping build"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Calendar changed, proceeding with build"
            echo "changed=true" >> $GITHUB_OUTPUT
            # Store current hash for next run
            echo "$CURRENT_HASH" > previous_calendar_hash.txt
          fi

      - name: Save calendar hash
        if: steps.check-changes.outputs.changed == 'true'
        uses: actions/cache/save@v3
        with:
          path: previous_calendar_hash.txt
          key: calendar-hash-${{ github.run_id }}

  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    environment: github-pages
    needs: [check-calendar-changes]
    if: |
      always() && (
        github.event_name != 'schedule' ||
        needs.check-calendar-changes.outputs.calendar-changed == 'true' ||
        startsWith(github.event.schedule, '1 ')
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
            ref: github-pages
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v3
      - name: Build
        env:
          CAL_URI: ${{ secrets.CAL_URI }}
          SITE_OWNER_EMAIL: ${{ secrets.SITE_OWNER_EMAIL }}
          ALLOW_UNACCEPTED: ${{ vars.ALLOW_UNACCEPTED }}
          ALWAYS_ALLOW_SENDERS: ${{ secrets.ALWAYS_ALLOW_SENDERS }}
          CAL_EMAIL: ${{ secrets.CAL_EMAIL }}
          TIMEZONE: ${{ vars.TIMEZONE }}
          SITE_TITLE: ${{ vars.SITE_TITLE }}
          SITE_URL: ${{ vars.SITE_URL }}
          SITE_DESCRIPTION: ${{ vars.SITE_DESCRIPTION }}
          THEATER_URL: ${{ vars.THEATER_URL }}
        run: |
          # Build your site here
          python3 -m venv venv
          source venv/bin/activate
          pip3 install -r requirements.txt
          python3 parse_cal.py
          python3 make_site.py
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload site filder
          path: './site'
          
  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && needs.build.result == 'success'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Keep the repo active so GitHub doesn't disable scheduled workflows (60-day inactivity rule)
  update-last-build:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always() && needs.deploy.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - name: Update .last-build timestamp
        run: |
          date -u +"%Y-%m-%d" > .last-build
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .last-build
          git diff --cached --quiet && echo "Already up to date" || (git commit -m "Update .last-build [skip ci]" && git push)

